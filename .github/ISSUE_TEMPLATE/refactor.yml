name: 🛠 Refactor
description: 코드 리팩토링
title: "[REFACTOR] "
labels: ["refactor"]

body:
  - type: textarea
    attributes:
      label: 리팩토링 대상
      placeholder: 어떤 코드를 개선하는지
    validations:
      required: true

  - type: textarea
    attributes:
      label: 변경 이유
      placeholder: 왜 리팩토링이 필요한지

  - type: checkboxes
    attributes:
      label: 작업 내용
      options:
        - label: 코드 구조 개선
        - label: 성능 개선
        - label: 가독성 개선

  - type: dropdown
    attributes:
      label: 대상 브랜치
      options:
        - develop
